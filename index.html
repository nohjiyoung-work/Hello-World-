<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노지영 / Noh Jiyoung</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="split-screen">
  <div id="panel-left" class="panel" data-hint="click">
    <div class="panel-content" id="content-left">
      <p>안녕하세요.<br>저는 노지영입니다.</p>
    </div>
  </div>
  <div id="panel-right" class="panel" data-hint="click">
    <div class="panel-content" id="content-right">
      <p>Hello!<br>I'm Noh jiyoung.</p>
    </div>
  </div>
</div>

<div id="story-kor" class="story-screen lang-kor hidden">
  <div class="feed-wrap" id="feed-wrap-kor">
    <div class="feed" id="feed-kor"></div>
  </div>
</div>

<div id="story-eng" class="story-screen lang-eng hidden">
  <div class="feed-wrap" id="feed-wrap-eng">
    <div class="feed" id="feed-eng"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
